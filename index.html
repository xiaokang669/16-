<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16重动物人格测试 | 解锁你的灵魂本色</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{background:linear-gradient(135deg,#fdd6e8 0%,#c7e6f5 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{max-width:700px;width:100%;background:#fff;border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,0.1);overflow:hidden}
.start-page{padding:60px 40px;text-align:center}
.start-page h1{font-size:32px;color:#4a4a4a;margin-bottom:20px}
.start-page p{font-size:18px;color:#777;margin-bottom:40px;line-height:1.6}
.start-btn,.restart-btn{padding:15px 40px;background:linear-gradient(90deg,#f8a1d1 0%,#a8c8f2 100%);color:#fff;border:none;border-radius:50px;font-size:18px;cursor:pointer;transition:all 0.3s}
.start-btn:hover{transform:translateY(-3px)}
.restart-btn{background:#fff;color:#f8a1d1;border:2px solid #f8a1d1}
.restart-btn:hover{background:#f8a1d1;color:#fff}
.question-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:999;display:none}
.modal-content{background:#fff;border-radius:24px;width:90%;max-width:520px;padding:40px 30px;text-align:center;position:relative;max-height:90vh;overflow-y:auto}
/* 进度条样式 */
.progress-bar{position:absolute;top:0;left:0;width:100%;height:6px;background:#f5f5f5}
.progress-fill{height:100%;background:linear-gradient(90deg,#f8a1d1 0%,#a8c8f2 100%);width:0%;transition:width 0.3s ease}
.question-count{position:absolute;top:20px;right:20px;color:#999}
.modal-content h2{font-size:22px;color:#444;margin-bottom:30px;line-height:1.5;padding-top:10px}
.options{display:flex;flex-direction:column;gap:12px}
.option{padding:14px 20px;border:2px solid #f0d9ee;border-radius:14px;font-size:16px;cursor:pointer;transition:all 0.2s}
.option:hover{border-color:#f8a1d1;background:#fdf5fb}
.option.selected{background:linear-gradient(90deg,#f8a1d1 0%,#a8c8f2 100%);color:#fff;border-color:#f8a1d1}
.option.disabled{pointer-events:none;opacity:0.7}
.loading{display:none;text-align:center;padding:60px 0}
.loading-spinner{width:50px;height:50px;border:5px solid #f3e5f5;border-top:5px solid #f8a1d1;border-radius:50%;animation:spin 1s infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.result-page{padding:40px 30px;text-align:center;display:none}
.result-header h2{font-size:28px;color:#444;margin-bottom:10px}
.result-header p{color:#777}
.animal-avatar{width:220px;height:220px;margin:30px auto;border-radius:50%;overflow:hidden;border:8px solid #fdd6e8;background:#fdf5fb;display:flex;align-items:center;justify-content:center}
.animal-avatar img{width:100%;height:100%;object-fit:cover}
/* 图片加载失败样式 */
.animal-avatar img::after{content:"🐾";font-size:60px;color:#f8a1d1}
.animal-desc-card{background:#fdf5fb;border-radius:18px;padding:25px;text-align:left;line-height:1.8;margin-bottom:30px}
.animal-desc-card h3{color:#f8a1d1;margin-bottom:10px}

/* 响应式优化 */
@media (max-width: 480px) {
  .start-page{padding:40px 20px}
  .start-page h1{font-size:26px}
  .start-page p{font-size:16px}
  .modal-content{padding:30px 20px}
  .modal-content h2{font-size:20px}
  .option{font-size:15px;padding:12px 16px}
  .animal-avatar{width:180px;height:180px}
}
</style>
</head>

<div class="container">
  <div class="start-page" id="start-page">
    <h1>16重动物人格测试</h1>
    <p>50道潜意识选择，解锁你灵魂深处的本色<br>跟随内心第一直觉，答案无关对错</p>
    <button class="start-btn" id="start-btn">解锁我的灵魂动物</button>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p>正在解析你的灵魂特质...</p>
  </div>

  <div class="result-page" id="result-page">

      <p>灵魂本色深度解析</p>
    </div>
    <div class="animal-avatar">

    </div>
    <div class="animal-desc-card">
      <h3>灵魂特质</h3>
      <p id="animal-desc"></p>
    </div>
    <button class="restart-btn" id="restart-btn">重新解锁灵魂本色</button>
  </div>
</div>

<div class="question-modal" id="question-modal">
  <div class="modal-content">
    <!-- 进度条 -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="question-count" id="qcount">1/50</div>
    <h2 id="qtext"></h2>
    <div class="options">
      <div class="option" data-key="A">A</div>
      <div class="option" data-key="B">B</div>
      <div class="option" data-key="C">C</div>
      <div class="option" data-key="D">D</div>
    </div>
  </div>
</div>

var idx = 0;
var answers = [];
var opts = document.querySelectorAll(".option");
var qtext = document.getElementById("qtext");
var qcount = document.getElementById("qcount");
var modal = document.getElementById("question-modal");
var startBtn = document.getElementById("start-btn");
var restartBtn = document.getElementById("restart-btn");
var progressFill = document.getElementById("progress-fill");
var isAnswering = false; // 防止重复点击

startBtn.onclick = function(){
  document.getElementById("start-page").style.display = "none";
  show(idx);
};

function show(i){
  // 更新进度条
  var progress = ((i+1)/50)*100;
  progressFill.style.width = progress + "%";
  
  qcount.innerText = (i+1)+"/50";
  qtext.innerText = questions[i].q;
  opts[0].innerText = "A "+questions[i].A;
  opts[1].innerText = "B "+questions[i].B;
  opts[2].innerText = "C "+questions[i].C;
  opts[3].innerText = "D "+questions[i].D;
  modal.style.display = "flex";
  opts.forEach(o=>{
    o.classList.remove("selected", "disabled");
  });
  isAnswering = false; // 重置答题状态
}

for(var i=0;i<opts.length;i++){
  opts[i].onclick = function(){
    // 防止重复点击
    if(isAnswering) return;
    isAnswering = true;
    
    this.classList.add("selected");
    // 禁用所有选项
    opts.forEach(o=>o.classList.add("disabled"));
    
    answers[idx] = this.dataset.key;
    idx++;
    
    setTimeout(function(){
      if(idx<50){
        show(idx);
      } else {
        modal.style.display = "none";
        document.getElementById("loading").style.display = "block";
        setTimeout(getResult,1600);
      }
    },500);
  }
}

function getResult(){
  var a=0,b=0,c=0,d=0;
  answers.forEach(k=>{
    if(k=="A")a++;
    else if(k=="B")b++;
    else if(k=="C")c++;
    else d++;
  });
  var max = Math.max(a,b,c,d);
  var t = a==max?"A":b==max?"B":c==max?"C":"D";
  var list = animals.filter(x=>x.type==t);
  var res = list[Math.floor(Math.random()*list.length)];
  
  document.getElementById("loading").style.display = "none";
  document.getElementById("result-page").style.display = "block";
  document.getElementById("animal-title").innerText = "你的灵魂动物："+res.name;
  document.getElementById("animal-img").src = res.img;
  document.getElementById("animal-desc").innerText = res.desc;
}

restartBtn.onclick = function(){
  idx=0;
  answers=[];
  isAnswering = false;
  progressFill.style.width = "0%"; // 重置进度条
  document.getElementById("result-page").style.display = "none";
  document.getElementById("start-page").style.display = "block";
};

// 图片加载失败处理
document.getElementById("animal-img").onerror = function() {
  this.src = "https://img.icons8.com/fluency/220/000000/animal.png";
};
</script>
